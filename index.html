<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accolink - Find nearby stays in Botswana</title>

<link rel="icon" type="image/png" href="https://bqaebgtvwxpdaqwdytss.supabase.co/storage/v1/object/public/company%20logo/accolink%20logo.png">
<link rel="apple-touch-icon" href="https://bqaebgtvwxpdaqwdytss.supabase.co/storage/v1/object/public/company%20logo/accolink%20logo.png">
<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a5a3a">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--primary:#1a5a3a;
--primary-dark:#0f3d27;
--accent:#1a5a3a; /* replaced brown with emerald */
--bg:#f5f3f0;
--text:#1a1a1a;
--text-light:#666;
--border:#ddd;
--white:#ffffff;
--success:#25d366;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background:var(--bg);
color:var(--text);
}

button{cursor:pointer;border:none}

/* modal */

#leadModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
z-index:9999;
align-items:center;
justify-content:center;
padding:20px;
}

.modal-box{
background:white;
padding:30px;
border-radius:12px;
width:100%;
max-width:400px;
text-align:center;
}

.modal-box input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid var(--border);
border-radius:6px;
}

.btn-submit{
background:var(--primary);
color:white;
padding:14px;
width:100%;
border-radius:6px;
font-weight:700;
}

/* cards */

.guesthouses-grid{
display:grid;
grid-template-columns:1fr;
gap:30px;
}

@media(min-width:768px){
.guesthouses-grid{
grid-template-columns:repeat(2,1fr);
}
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 12px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
}

.card-image{
width:100%;
height:220px;
object-fit:cover;
}

.card-content{
padding:20px;
display:flex;
flex-direction:column;
}

.card-title{
font-size:18px;
font-weight:700;
color:var(--primary);
}

.card-price{
font-weight:700;
color:var(--accent);
margin:10px 0;
}

.card-button{
background:var(--accent);
color:white;
padding:12px;
border-radius:6px;
font-weight:700;
margin-top:auto;
}

.card-button:hover{
background:#0f3d27; /* emerald hover */
}

/* contact */

.contact-section{
margin-top:32px;
padding:24px;
background:var(--primary);
border-radius:10px;
color:white;
}

.contact-buttons{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.contact-btn{
padding:12px 20px;
font-weight:700;
border-radius:6px;
color:white;
flex:1;
}

.contact-btn-whatsapp{
background:var(--success);
}

.contact-btn-phone{
background:var(--accent);
}

</style>
</head>

<body>

<div id="leadModal">
<div class="modal-box">
<h3>Contact Guest House</h3>
<p>Enter your details to continue</p>
<input id="guestName" placeholder="Your Name">
<input id="guestPhone" placeholder="Your Phone Number">
<button class="btn-submit" onclick="submitLead()">Continue</button>
<p onclick="closeLeadModal()" style="margin-top:10px;font-size:12px;color:#999;cursor:pointer">Cancel</p>
</div>
</div>

<main style="padding:40px">

<h2>Featured Guesthouses</h2>
<div id="guesthouses" class="guesthouses-grid"></div>

</main>

<script>

const SUPABASE_URL='https://bqaebgtvwxpdaqwdytss.supabase.co'
const SUPABASE_KEY='YOUR_PUBLIC_KEY'

const _supabase=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let allGuesthouses=[]
let currentHouse=""
let currentOwnerPhone=""
let bookingAction=""

async function loadGuesthouses(){

const res=await fetch(`${SUPABASE_URL}/rest/v1/guesthouses?select=*`,{
headers:{
apikey:SUPABASE_KEY,
Authorization:`Bearer ${SUPABASE_KEY}`
}
})

allGuesthouses=await res.json()

renderGuesthouses(allGuesthouses)

}

function renderGuesthouses(data){

const container=document.getElementById("guesthouses")

container.innerHTML=data.map(g=>{

const img=g.images?.[0]||"https://via.placeholder.com/400"

return`

<div class="card">

<img src="${img}" class="card-image">

<div class="card-content">

<h3 class="card-title">${g.name}</h3>

<p>${g.location}</p>

<p class="card-price">P${g.min_price}/night</p>

<button class="card-button" onclick="showDetail(${g.id})">Explore</button>

</div>

</div>

`

}).join("")

}

function showDetail(id){

const gh=allGuesthouses.find(g=>g.id===id)

document.body.insertAdjacentHTML("beforeend",`

<div id="detailPopup" style="position:fixed;top:0;left:0;width:100%;height:100%;background:black">

<div style="background:white;margin:50px auto;padding:30px;max-width:600px">

<h2>${gh.name}</h2>

<p>${gh.location}</p>

<div class="contact-buttons">

<button class="contact-btn contact-btn-whatsapp"
onclick="triggerWhatsApp('${gh.name}','${gh.whatsapp?.replace(/\D/g,'')}')">
WhatsApp
</button>

<button class="contact-btn contact-btn-phone"
onclick="triggerCall('${gh.name}','${gh.phone?.replace(/\D/g,'')}',${gh.id})">
Call
</button>

</div>

</div>

</div>

`)

}

function triggerWhatsApp(name,phone){

currentHouse=name
currentOwnerPhone=phone
bookingAction="whatsapp"

document.getElementById("leadModal").style.display="flex"

}

function triggerCall(name,phone,id){

currentHouse=name
currentOwnerPhone=phone
bookingAction="call"
window.callGuesthouseId=id

document.getElementById("leadModal").style.display="flex"

}

function closeLeadModal(){

document.getElementById("leadModal").style.display="none"

}

async function submitLead(){

const name=document.getElementById("guestName").value
const phone=document.getElementById("guestPhone").value

if(!name||!phone){
alert("Enter your details")
return
}

await _supabase
.from("leads")
.insert([{
guest_name:name,
guest_phone:phone,
house_name:currentHouse
}])

closeLeadModal()

if(bookingAction==="call"){

window.location.href=`tel:${currentOwnerPhone}`

}else{

const message="Hello i saw you guest house on Accolink i would like to book a room please"

window.open(`https://wa.me/${currentOwnerPhone}?text=${encodeURIComponent(message)}`)

}

}

loadGuesthouses()

</script>

</body>
</html>
